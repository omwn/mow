<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>

    <style>
        .sense-box:hover { border-color: #60a5fa !important; }
        .sense-box:has(.concept-inner:hover) { border-color: #e5e7eb !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ========== RELATION MAPPINGS ==========
        // Map full DB relation names to short codes used by the UI
        // Relation config loaded from relations.json at startup.
        // Structure: { dbName: { short, color, en, [langCode]: label, ... } }
        let _relConfig = {};
        let _relLang = 'en';

        // ========== SITE CONFIG ==========
        // Loaded from local.json at startup; falls back silently if absent.
        // See notes/local.json.example for supported fields.
        let _siteConfig = {};
        const _configPromise = fetch('local.json', { cache: 'no-cache' })
            .then(r => r.ok ? r.json() : {})
            .catch(() => ({}))
            .then(cfg => {
                if (cfg && typeof cfg === 'object' && !Array.isArray(cfg)) {
                    Object.assign(_siteConfig, cfg);
                }
            });

        // Build lookup tables from _relConfig once loaded.
        let RELATION_TO_SHORT = {};
        let _relColors = {};
        function _buildRelLookups() {
            RELATION_TO_SHORT = {};
            _relColors = {};
            for (const [name, entry] of Object.entries(_relConfig)) {
                if (entry.short) RELATION_TO_SHORT[name] = entry.short;
                if (entry.color) _relColors[entry.short || name] = entry.color;
            }
        }

        const getRelLabel = (shortOrName) => {
            // Find entry by short code or DB name
            const entry = _relConfig[shortOrName]
                ?? Object.values(_relConfig).find(e => e.short === shortOrName);
            if (entry) return entry[_relLang] ?? entry.en ?? shortOrName;
            return shortOrName.replace(/_/g, ' ').replace(/^-/, '');
        };

        // Test hook — allows Playwright tests to inspect and manipulate rel config
        window._relTestHook = {
            setLang: (l) => { _relLang = l; },
            getLabel: (s) => getRelLabel(s),
            getConfig: () => _relConfig,
        };

        const posToHumanReadable = {
            'NOUN': 'Noun', 'VERB': 'Verb', 'ADJ': 'Adjective', 'ADV': 'Adverb',
            'CONJ': 'Conjunction', 'ADP': 'Adposition', 'NREF': 'Non-referential', 'UNK': 'Unknown'
        };

        const remove_accents = (text) => text.normalize('NFD').replace(/[\u0300-\u036f]/g, '');

        // ========== DATABASE URLs ==========
        // Databases are always served from the same directory as this HTML file.
        // Locally: web/ after running build.sh. In production: downloaded by the Pages workflow.
        const DB_BASE = '';

        // ========== SQL DATABASE LAYER ==========
        let _db = null;
        let _SQL = null;
        let _provDb = null;

        function cachedExec(sql, params = []) {
            if (!_db) return [];
            try {
                const results = _db.exec(sql, params);
                if (!results || results.length === 0) return [];
                const { columns, values } = results[0];
                return values.map(row => {
                    const obj = {};
                    columns.forEach((col, i) => { obj[col] = row[i]; });
                    return obj;
                });
            } catch (e) {
                console.error('SQL error:', sql, params, e);
                return [];
            }
        }

        // Language code to name mapping (built from DB)
        let _langNames = {};
        let _langRowidToCode = {};

        function buildLangNames() {
            const hasName = cachedExec(`PRAGMA table_info(languages)`).some(c => c.name === 'name');
            const sql = hasName
                ? `SELECT rowid, code, name FROM languages ORDER BY code`
                : `SELECT rowid, code FROM languages ORDER BY code`;
            cachedExec(sql).forEach(r => {
                _langRowidToCode[r.rowid] = r.code;
                _langNames[r.code] = r.name || r.code.toUpperCase();
            });
        }

        const _SENSE_COLS = `s.rowid as sense_id, e.language_rowid as lang_rowid, syn.pos as pos,
                       f.form as lemma, f.rank as matched_rank, s.sense_index as ind, syn.rowid as synset_id`;
        const _SENSE_JOINS = `FROM forms f
                JOIN entries e ON f.entry_rowid = e.rowid
                JOIN senses s ON s.entry_rowid = e.rowid
                JOIN synsets syn ON s.synset_rowid = syn.rowid`;

        function searchWordform(term) {
            const normalized = remove_accents(term.toLowerCase());
            const rows = cachedExec(`
                SELECT ${_SENSE_COLS} ${_SENSE_JOINS}
                WHERE f.normalized_form = ?
                ORDER BY e.language_rowid, f.form
            `, [normalized]);
            return rows.map(r => ({ ...r, lg: _langRowidToCode[r.lang_rowid] }));
        }

        function searchGlob(term) {
            const pattern = remove_accents(term.toLowerCase()).replace(/\*/g, '%').replace(/\?/g, '_');
            const rows = cachedExec(`
                SELECT ${_SENSE_COLS} ${_SENSE_JOINS}
                WHERE f.normalized_form LIKE ? LIMIT 2000
            `, [pattern]);
            return rows.map(r => ({ ...r, lg: _langRowidToCode[r.lang_rowid] }));
        }

        function searchByIli(term) {
            const norm = term.replace(/^cili\./, '');
            const rows = cachedExec(`
                SELECT ${_SENSE_COLS}
                FROM synsets syn
                JOIN senses s ON s.synset_rowid = syn.rowid
                JOIN entries e ON s.entry_rowid = e.rowid
                JOIN forms f ON f.entry_rowid = e.rowid AND f.rank = 0
                WHERE syn.ili = ?
                ORDER BY e.language_rowid, f.form
            `, [norm]);
            return rows.map(r => ({ ...r, lg: _langRowidToCode[r.lang_rowid] }));
        }

        function searchDefinition(term, langCodes) {
            const params = [`%${term}%`];
            let langClause = '';
            if (langCodes && langCodes.size > 0) {
                const rowids = Object.entries(_langRowidToCode)
                    .filter(([, code]) => langCodes.has(code))
                    .map(([rowid]) => parseInt(rowid));
                if (rowids.length > 0) {
                    langClause = `AND d.language_rowid IN (${rowids.map(() => '?').join(',')})`;
                    params.push(...rowids);
                }
            }
            const rows = cachedExec(`
                SELECT ${_SENSE_COLS}
                FROM definitions d
                JOIN synsets syn ON d.synset_rowid = syn.rowid
                JOIN senses s ON s.synset_rowid = syn.rowid
                JOIN entries e ON s.entry_rowid = e.rowid
                JOIN forms f ON f.entry_rowid = e.rowid AND f.rank = 0
                WHERE d.definition LIKE ? ${langClause} LIMIT 2000
            `, params);
            return rows.map(r => ({ ...r, lg: _langRowidToCode[r.lang_rowid] }));
        }

        function detectSearchMode(term) {
            if (/^(cili\.)?i\d+$/.test(term)) return 'ili';
            if (term.startsWith('def:')) return 'definition';
            if (term.includes('*') || term.includes('?')) return 'glob';
            return 'exact';
        }

        function querySense(senseRowid) {
            const rows = cachedExec(`
                SELECT s.rowid as id, e.language_rowid as lang_rowid, e.pos as entry_pos,
                       syn.pos as pos, syn.rowid as c, s.sense_index as ind
                FROM senses s
                JOIN entries e ON s.entry_rowid = e.rowid
                JOIN synsets syn ON s.synset_rowid = syn.rowid
                WHERE s.rowid = ?
            `, [senseRowid]);
            if (rows.length === 0) return null;
            const r = rows[0];

            // Get lemma (rank 0) and variants (rank > 0)
            const forms = cachedExec(`
                SELECT rowid, form, rank FROM forms
                WHERE entry_rowid = (SELECT entry_rowid FROM senses WHERE rowid = ?)
                ORDER BY rank
            `, [senseRowid]);
            const lemmaForm = forms.find(f => f.rank === 0);
            const lemma = lemmaForm?.form || '';
            const variants = forms.filter(f => f.rank > 0).map(f => f.form);
            const pronunciations = lemmaForm ? cachedExec(`
                SELECT variety, pronunciation, audio FROM pronunciations
                WHERE form_rowid = ? ORDER BY rowid
            `, [lemmaForm.rowid]) : [];

            // Get examples with annotations
            const examples = cachedExec(`
                SELECT e.rowid as example_rowid, e.example
                FROM examples e
                JOIN sense_examples se ON se.example_rowid = e.rowid
                WHERE se.sense_rowid = ?
            `, [senseRowid]);

            const ex = examples.map(ex => {
                const anns = cachedExec(`
                    SELECT start_offset, end_offset, sense_rowid
                    FROM example_annotations WHERE example_rowid = ?
                `, [ex.example_rowid]);
                // Build HTML with bolding for the current sense
                let text = ex.example;
                let parts = [];
                let lastIdx = 0;
                const sorted = anns.sort((a, b) => a.start_offset - b.start_offset);
                for (const ann of sorted) {
                    if (ann.start_offset > lastIdx) {
                        parts.push(text.substring(lastIdx, ann.start_offset));
                    }
                    const tokenText = text.substring(ann.start_offset, ann.end_offset);
                    if (ann.sense_rowid === senseRowid) {
                        parts.push(`<b>${tokenText}</b>`);
                    } else {
                        parts.push(tokenText);
                    }
                    lastIdx = ann.end_offset;
                }
                if (lastIdx < text.length) parts.push(text.substring(lastIdx));
                return parts.join('');
            });

            // Get sense relations
            const senseRels = cachedExec(`
                SELECT rt.type, sr.target_rowid as target, sr.rowid as rid
                FROM sense_relations sr
                JOIN relation_types rt ON sr.type_rowid = rt.rowid
                WHERE sr.source_rowid = ?
            `, [senseRowid]);
            const sr = senseRels.map(rel => ({
                t: RELATION_TO_SHORT[rel.type] || rel.type,
                to: rel.target,
                rid: rel.rid
            }));

            return {
                id: r.id.toString(),
                l: lemma,
                v: variants,
                p: pronunciations.length > 0 ? pronunciations : undefined,
                lg: _langRowidToCode[r.lang_rowid],
                c: r.c,
                ind: r.ind,
                ex: ex.length > 0 ? ex : undefined,
                sr: sr.length > 0 ? sr : undefined,
                ontological_category: r.pos
            };
        }

        function queryConcept(synsetRowid) {
            const rows = cachedExec(`
                SELECT rowid, ili, pos FROM synsets WHERE rowid = ?
            `, [synsetRowid]);
            if (rows.length === 0) return null;
            const r = rows[0];

            // Get definitions grouped by language
            const defs = cachedExec(`
                SELECT rowid as def_rowid, definition, language_rowid FROM definitions
                WHERE synset_rowid = ? ORDER BY language_rowid
            `, [synsetRowid]);
            const d = {};
            const dr = {};
            defs.forEach(def => {
                const lang = _langRowidToCode[def.language_rowid];
                d[lang] = def.definition;
                dr[lang] = def.def_rowid;
            });

            // Get definition annotations (for English)
            const enLangCode = Object.entries(_langRowidToCode).find(([_, code]) => code === 'en');
            const enLangRowid = enLangCode ? parseInt(enLangCode[0]) : null;
            const enDef = defs.find(def => def.language_rowid === enLangRowid);
            let da = undefined;
            if (enDef) {
                const anns = cachedExec(`
                    SELECT start_offset as so, end_offset as eo, sense_rowid as s
                    FROM definition_annotations WHERE definition_rowid = ?
                `, [enDef.def_rowid]);
                if (anns.length > 0) da = anns;
            }

            // Get senses grouped by language
            const senses = cachedExec(`
                SELECT s.rowid as sense_id, e.language_rowid
                FROM senses s
                JOIN entries e ON s.entry_rowid = e.rowid
                WHERE s.synset_rowid = ?
                ORDER BY e.language_rowid
            `, [synsetRowid]);
            const s = {};
            senses.forEach(sense => {
                const lang = _langRowidToCode[sense.language_rowid];
                if (!s[lang]) s[lang] = [];
                s[lang].push(sense.sense_id);
            });

            // Get concept relations
            const rels = cachedExec(`
                SELECT rt.type, sr.target_rowid as target, sr.rowid as rid
                FROM synset_relations sr
                JOIN relation_types rt ON sr.type_rowid = rt.rowid
                WHERE sr.source_rowid = ?
            `, [synsetRowid]);
            const cr = rels.map(rel => ({
                t: RELATION_TO_SHORT[rel.type] || rel.type,
                to: rel.target,
                rid: rel.rid
            }));

            // Get ARASAAC pictogram IDs
            const arasaacRows = cachedExec(`
                SELECT arasaac_id FROM arasaac WHERE synset_rowid = ?
            `, [synsetRowid]);
            const ara = arasaacRows.length > 0 ? arasaacRows.map(a => a.arasaac_id) : undefined;

            return {
                oc: r.pos,
                ili: r.ili,
                d: Object.keys(d).length > 0 ? d : undefined,
                dr: Object.keys(dr).length > 0 ? dr : undefined,
                da,
                s: Object.keys(s).length > 0 ? s : undefined,
                cr: cr.length > 0 ? cr : undefined,
                ara
            };
        }

        function findPath(fromId, toId) {
            if (fromId === toId) return [{ node: fromId, rel: null }];
            const MAX_DEPTH = 12;
            const visited = new Map([[fromId, { prev: null, rel: null }]]);
            let frontierArr = [fromId];
            let frontierSet = new Set([fromId]);
            for (let depth = 0; depth < MAX_DEPTH && frontierArr.length > 0; depth++) {
                const ph = frontierArr.map(() => '?').join(',');
                const rows = cachedExec(`
                    SELECT source_rowid as src, target_rowid as tgt, rt.type as rel
                    FROM synset_relations sr
                    JOIN relation_types rt ON sr.type_rowid = rt.rowid
                    WHERE source_rowid IN (${ph}) OR target_rowid IN (${ph})
                `, [...frontierArr, ...frontierArr]);
                const nextArr = [];
                const nextSet = new Set();
                let found = false;
                for (const {src, tgt, rel} of rows) {
                    for (const [node, neighbor] of [[src, tgt], [tgt, src]]) {
                        if (!frontierSet.has(node) || visited.has(neighbor)) continue;
                        visited.set(neighbor, { prev: node, rel });
                        if (neighbor === toId) { found = true; break; }
                        if (!nextSet.has(neighbor)) { nextArr.push(neighbor); nextSet.add(neighbor); }
                    }
                    if (found) break;
                }
                if (found) {
                    const path = [];
                    let cur = toId;
                    while (cur !== null) {
                        const { prev, rel } = visited.get(cur);
                        path.unshift({ node: cur, rel });
                        cur = prev;
                    }
                    return path;
                }
                frontierArr = nextArr;
                frontierSet = nextSet;
            }
            return null;
        }

        const _labelCache = {};
        const _summaryCache = {};
        let _hasCoreTable = null;

        async function readChunksToUint8Array(reader, onProgress) {
            const chunks = [];
            let total = 0;
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                chunks.push(value);
                total += value.length;
                onProgress?.(total);
            }
            const out = new Uint8Array(total);
            let off = 0;
            for (const c of chunks) { out.set(c, off); off += c.length; }
            return out;
        }

        function getConceptLabel(synsetRowid, lang = 'en') {
            const key = `${synsetRowid}-${lang}`;
            if (_labelCache[key] !== undefined) return _labelCache[key];
            const queryLang = `
                SELECT f.form FROM senses s
                JOIN entries e ON s.entry_rowid = e.rowid
                JOIN forms f ON f.entry_rowid = e.rowid
                JOIN languages l ON e.language_rowid = l.rowid
                WHERE s.synset_rowid = ? AND l.code = ? AND f.rank = 0
                ORDER BY s.sense_index LIMIT 1`;
            const queryAny = `
                SELECT f.form, l.code as lang_code FROM senses s
                JOIN entries e ON s.entry_rowid = e.rowid
                JOIN forms f ON f.entry_rowid = e.rowid
                JOIN languages l ON e.language_rowid = l.rowid
                WHERE s.synset_rowid = ? AND f.rank = 0
                ORDER BY s.sense_index LIMIT 1`;
            let rows = cachedExec(queryLang, [synsetRowid, lang]);
            if (rows.length > 0) {
                const result = { form: rows[0].form, lang };
                _labelCache[key] = result;
                return result;
            }
            if (lang !== 'en') {
                rows = cachedExec(queryLang, [synsetRowid, 'en']);
                if (rows.length > 0) {
                    const result = { form: rows[0].form, lang: 'en' };
                    _labelCache[key] = result;
                    return result;
                }
            }
            rows = cachedExec(queryAny, [synsetRowid]);
            const result = rows[0]?.form ? { form: rows[0].form, lang: rows[0].lang_code } : null;
            _labelCache[key] = result;
            return result;
        }

        function getAllLanguages() {
            const rows = cachedExec(`SELECT code FROM languages ORDER BY code`);
            return rows.map(r => r.code);
        }

        function queryResources() {
            const cols = new Set(cachedExec('PRAGMA table_info(resources)').map(c => c.name));
            const coverage = cols.has('synset_count')
                ? ', r.synset_count, r.sense_count'
                : ', null AS synset_count, null AS sense_count';
            return cachedExec(
                `SELECT r.code, r.version, r.label, l.code AS language,
                        r.url, r.citation, r.licence, r.email, r.status,
                        r.confidence_score, r.extra${coverage}
                 FROM resources r
                 LEFT JOIN languages l ON r.language_rowid = l.rowid
                 ORDER BY r.label`
            );
        }

        function queryStats() {
            const get = sql => { const r = cachedExec(sql); return r.length ? Object.values(r[0])[0] : 0; };
            return {
                synsets:   get(`SELECT COUNT(*) FROM synsets`),
                entries:   get(`SELECT COUNT(*) FROM entries`),
                senses:    get(`SELECT COUNT(*) FROM senses`),
                languages: get(`SELECT COUNT(DISTINCT language_rowid) FROM entries`),
                wordnets:  get(`SELECT COUNT(*) FROM resources WHERE code NOT IN ('cili', 'pwn')`),
            };
        }

        function cachedExecProv(sql, params = []) {
            if (!_provDb) return [];
            try {
                const results = _provDb.exec(sql, params);
                if (!results || results.length === 0) return [];
                const { columns, values } = results[0];
                return values.map(row => {
                    const obj = {};
                    columns.forEach((col, i) => { obj[col] = row[i]; });
                    return obj;
                });
            } catch (e) {
                console.error('Provenance SQL error:', sql, params, e);
                return [];
            }
        }

        function queryProvenance(tableName, itemRowid) {
            return cachedExecProv(
                `SELECT pr.code, p.version, p.original_id
                 FROM provenance p
                 JOIN prov_tables pt ON p.table_rowid = pt.rowid
                 JOIN prov_resources pr ON p.resource_rowid = pr.rowid
                 WHERE pt.name = ? AND p.item_rowid = ?`,
                [tableName, itemRowid]
            );
        }

        function queryWordnetSummary(code, langCode) {
            const _cacheKey = `${code}:${langCode}`;
            if (_summaryCache[_cacheKey]) return _summaryCache[_cacheKey];
            const result = { posStats: null, iliPct: null, defCount: null, exCount: null, examples: [], relDist: [], senseRelDist: [] };
            if (!_provDb || !_db) return result;
            try {
                const sensesTableRow = cachedExecProv(`SELECT rowid FROM prov_tables WHERE name = 'senses'`)[0];
                if (!sensesTableRow) { _summaryCache[_cacheKey] = result; return result; }
                const sensesTable = sensesTableRow.rowid;
                const senseRows = cachedExecProv(
                    `SELECT p.item_rowid FROM provenance p
                     JOIN prov_resources pr ON p.resource_rowid = pr.rowid
                     WHERE p.table_rowid = ? AND pr.code = ?`,
                    [sensesTable, code]
                );
                if (!senseRows.length) { _summaryCache[_cacheKey] = result; return result; }

                _db.exec(`CREATE TEMP TABLE IF NOT EXISTS _wnsum_senses (id INTEGER PRIMARY KEY)`);
                _db.exec(`DELETE FROM _wnsum_senses`);
                const rowids = senseRows.map(r => r.item_rowid);
                for (let i = 0; i < rowids.length; i += 500) {
                    const vals = rowids.slice(i, i + 500).map(r => `(${r})`).join(',');
                    _db.exec(`INSERT OR IGNORE INTO _wnsum_senses VALUES ${vals}`);
                }

                const posRows = cachedExec(`
                    WITH src AS (
                        SELECT DISTINCT s.synset_rowid
                        FROM senses s WHERE s.rowid IN (SELECT id FROM _wnsum_senses)
                    )
                    SELECT syn.pos, COUNT(*) AS cnt,
                           SUM(CASE WHEN syn.ili IS NOT NULL THEN 1 ELSE 0 END) AS with_ili
                    FROM src JOIN synsets syn ON syn.rowid = src.synset_rowid
                    GROUP BY syn.pos ORDER BY cnt DESC
                `);
                if (posRows.length) {
                    result.posStats = posRows.map(r => ({ pos: r.pos, cnt: r.cnt, withIli: r.with_ili }));
                    const total = posRows.reduce((s, r) => s + r.cnt, 0);
                    const withIli = posRows.reduce((s, r) => s + r.with_ili, 0);
                    result.iliPct = total > 0 ? Math.round(100 * withIli / total) : 0;
                }

                const countRow = cachedExec(`
                    SELECT COUNT(*) AS ex_count
                    FROM sense_examples se
                    WHERE se.sense_rowid IN (SELECT id FROM _wnsum_senses)
                `)[0];
                if (countRow) result.exCount = countRow.ex_count;

                const defTableRow = cachedExecProv(
                    `SELECT rowid FROM prov_tables WHERE name = 'definitions'`
                )[0];
                if (defTableRow) {
                    const defCountRow = cachedExecProv(
                        `SELECT COUNT(*) AS cnt FROM provenance p
                         JOIN prov_resources pr ON p.resource_rowid = pr.rowid
                         WHERE p.table_rowid = ? AND pr.code = ?`,
                        [defTableRow.rowid, code]
                    )[0];
                    if (defCountRow) result.defCount = defCountRow.cnt;
                }

                const hasCore = !!_hasCoreTable;
                const coreExJoin = hasCore ? 'LEFT JOIN core_synsets cs ON cs.synset_rowid = syn.rowid' : '';
                const coreExOrder = hasCore ? '(cs.synset_rowid IS NULL),' : '';
                const coreRelJoin = hasCore ? 'LEFT JOIN core_synsets cs ON cs.synset_rowid = sr.source_rowid' : '';
                const coreRelOrder = hasCore ? '(cs.synset_rowid IS NULL),' : '';

                const lang = langCode || 'en';
                result.examples = cachedExec(`
                    WITH src_senses AS (
                        SELECT s.rowid, s.synset_rowid, s.sense_index, s.entry_rowid
                        FROM senses s WHERE s.rowid IN (SELECT id FROM _wnsum_senses)
                    ),
                    ranked AS (
                        SELECT syn.pos, f.form, syn.rowid AS synset_rowid,
                               ROW_NUMBER() OVER (
                                   PARTITION BY syn.pos
                                   ORDER BY ${coreExOrder}
                                            (CASE WHEN UNICODE(SUBSTR(f.form,1,1)) BETWEEN 97 AND 122
                                                       OR UNICODE(SUBSTR(f.form,1,1)) >= 128 THEN 0 ELSE 1 END),
                                            ss.sense_index, f.form
                               ) AS rn
                        FROM src_senses ss
                        JOIN synsets syn ON syn.rowid = ss.synset_rowid
                        JOIN entries e ON e.rowid = ss.entry_rowid
                        JOIN forms f ON f.entry_rowid = e.rowid AND f.rank = 0
                        JOIN languages l ON l.rowid = e.language_rowid
                        ${coreExJoin}
                        WHERE l.code = ?
                    )
                    SELECT pos, form, synset_rowid FROM ranked WHERE rn <= 5 ORDER BY pos, rn
                `, [lang]);

                const inverseTypes = new Set(
                    Object.entries(_relConfig)
                        .filter(([, e]) => e.short?.startsWith('-'))
                        .map(([name]) => name)
                );
                const relRows = cachedExec(`
                    WITH src AS (
                        SELECT DISTINCT s.synset_rowid
                        FROM senses s WHERE s.rowid IN (SELECT id FROM _wnsum_senses)
                    ),
                    rels AS (
                        SELECT rt.type, sr.source_rowid, sr.target_rowid,
                               COUNT(*) OVER (PARTITION BY rt.type) AS cnt,
                               ROW_NUMBER() OVER (
                                   PARTITION BY rt.type
                                   ORDER BY ${coreRelOrder}
                                            (CASE WHEN NOT EXISTS(
                                                SELECT 1 FROM senses s2
                                                JOIN entries e2 ON e2.rowid = s2.entry_rowid
                                                JOIN languages l2 ON l2.rowid = e2.language_rowid
                                                WHERE s2.synset_rowid = sr.target_rowid AND l2.code = ?
                                            ) THEN 1 ELSE 0 END),
                                            sr.rowid
                               ) AS rn
                        FROM synset_relations sr
                        JOIN src ON src.synset_rowid = sr.source_rowid
                        JOIN relation_types rt ON rt.rowid = sr.type_rowid
                        ${coreRelJoin}
                    )
                    SELECT type, cnt, source_rowid AS ex_src_rowid, target_rowid AS ex_tgt_rowid
                    FROM rels WHERE rn = 1
                    ORDER BY cnt DESC
                `, [lang]);
                result.relDist = relRows.filter(row => !inverseTypes.has(row.type));

                const senseRelRows = cachedExec(`
                    WITH rels AS (
                        SELECT rt.type,
                               sr.source_rowid, sr.target_rowid,
                               COUNT(*) OVER (PARTITION BY rt.type) AS cnt,
                               ROW_NUMBER() OVER (PARTITION BY rt.type ORDER BY sr.rowid) AS rn
                        FROM sense_relations sr
                        JOIN _wnsum_senses ws ON ws.id = sr.source_rowid
                        JOIN relation_types rt ON rt.rowid = sr.type_rowid
                    )
                    SELECT r.type, r.cnt, r.source_rowid AS ex_src_rowid, r.target_rowid AS ex_tgt_rowid,
                           (SELECT f.form FROM forms f WHERE f.entry_rowid =
                               (SELECT entry_rowid FROM senses WHERE rowid = r.source_rowid) AND f.rank = 0 LIMIT 1) AS src_form,
                           (SELECT f.form FROM forms f WHERE f.entry_rowid =
                               (SELECT entry_rowid FROM senses WHERE rowid = r.target_rowid) AND f.rank = 0 LIMIT 1) AS tgt_form
                    FROM rels r WHERE rn = 1
                    ORDER BY cnt DESC
                `);
                result.senseRelDist = senseRelRows.filter(row => !inverseTypes.has(row.type));
            } catch (e) {
                console.error('queryWordnetSummary error:', e);
            }
            _summaryCache[_cacheKey] = result;
            return result;
        }

        // ========== INDEXEDDB CACHE ==========
        const IDB_NAME = 'cygnet-cache';
        const IDB_STORE = 'blobs';

        function idbOpen() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(IDB_NAME, 1);
                req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function idbGet(key) {
            const db = await idbOpen();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(IDB_STORE, 'readonly');
                const req = tx.objectStore(IDB_STORE).get(key);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function idbPut(key, value) {
            const db = await idbOpen();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(IDB_STORE, 'readwrite');
                tx.objectStore(IDB_STORE).put(value, key);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function idbDel(key) {
            const db = await idbOpen();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(IDB_STORE, 'readwrite');
                tx.objectStore(IDB_STORE).delete(key);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function idbClear() {
            const db = await idbOpen();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(IDB_STORE, 'readwrite');
                tx.objectStore(IDB_STORE).clear();
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        function useClickOutside(ref, open, onClose) {
            useEffect(() => {
                if (!open) return;
                const handleClick = (e) => {
                    if (ref.current && !ref.current.contains(e.target)) onClose();
                };
                document.addEventListener('mousedown', handleClick);
                return () => document.removeEventListener('mousedown', handleClick);
            }, [open]);
        }

            // Initialize database
            useEffect(() => {
                (async () => {
                    try {
                        await _configPromise;
                        const dbFile = _siteConfig.databases?.main?.filename;
                        if (!dbFile) { setDbReady(true); return; }
                        setDbProgress('Loading sql.js...');
                        const SQL = await initSqlJs({
                            locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${file}`
                        });

                        // Check IndexedDB cache, validating against filename and server mtime
                        let buf;
                        try {
                            const cached = await idbGet('db');
                            if (cached) {
                                let stale = false;
                                const cachedFilename = await idbGet('db-filename');
                                if (!cachedFilename || cachedFilename !== dbFile) {
                                    stale = true;
                                } else {
                                    try {
                                        const head = await fetch(DB_BASE + dbFile, { method: 'HEAD', cache: 'no-cache' });
                                        const serverMtime = head.headers.get('last-modified') || head.headers.get('etag');
                                        const cachedMtime = await idbGet('db-mtime');
                                        if (serverMtime && serverMtime !== cachedMtime) stale = true;
                                    } catch (_) { /* offline — trust cache */ }
                                }
                                if (stale) {
                                    setDbProgress('Database updated, clearing cache...');
                                    await Promise.all([
                                        idbDel('db'), idbDel('provdb'),
                                        idbDel('db-mtime'), idbDel('db-filename'),
                                        idbDel('provdb-filename'), idbDel('db-compressed'),
                                    ]);
                                } else {
                                    setDbProgress('Loading from cache...');
                                    const isCompressed = await idbGet('db-compressed');
                                    if (isCompressed) {
                                        setDbProgress('Decompressing...');
                                        const ds = new DecompressionStream('gzip');
                                        const writer = ds.writable.getWriter();
                                        const reader = ds.readable.getReader();
                                        writer.write(new Uint8Array(cached));
                                        writer.close();
                                        const chunks = [];
                                        while (true) {
                                            const { done, value } = await reader.read();
                                            if (done) break;
                                            chunks.push(value);
                                        }
                                        const total = chunks.reduce((s, c) => s + c.length, 0);
                                        buf = new Uint8Array(total);
                                        let off = 0;
                                        for (const ch of chunks) { buf.set(ch, off); off += ch.length; }
                                    } else {
                                        buf = new Uint8Array(cached);
                                    }
                                }
                            }
                        } catch (e) {
                            console.warn('IndexedDB cache read failed:', e);
                        }

                        if (!buf) {
                            setDbProgress('Downloading database...');
                            const response = await fetch(DB_BASE + dbFile, { cache: 'reload' });
                            if (!response.ok) throw new Error(`Failed to fetch database: ${response.status}`);
                            const serverMtime = response.headers.get('last-modified') || response.headers.get('etag') || '';
                            const compressedTotal = parseInt(response.headers.get('content-length') || '0');

                            // Touch-primary devices store compressed (~130 MB); desktops store
                            // uncompressed (~340 MB) so new tabs can load without re-decompressing.
                            const isMobile = window.matchMedia('(hover: none) and (pointer: coarse)').matches;

                            if (isMobile) {
                                // Mobile: cache compressed to save device storage.
                                setDbProgress('Downloading...');
                                const compressedBuf = await response.arrayBuffer();
                                setDbProgress('Decompressing...');
                                const ds = new DecompressionStream('gzip');
                                const writer = ds.writable.getWriter();
                                const reader = ds.readable.getReader();
                                writer.write(new Uint8Array(compressedBuf));
                                writer.close();
                                buf = await readChunksToUint8Array(reader);
                                setDbProgress('Caching for next visit...');
                                try {
                                    await idbPut('db', compressedBuf);
                                    await idbPut('db-compressed', true);
                                    await idbPut('db-filename', dbFile);
                                    if (serverMtime) await idbPut('db-mtime', serverMtime);
                                } catch (e) { console.warn('IndexedDB cache write failed:', e); }
                            } else {
                                // Desktop: stream-decompress and cache uncompressed.
                                const ds = new DecompressionStream('gzip');
                                const reader = response.body.pipeThrough(ds).getReader();
                                buf = await readChunksToUint8Array(reader, (loaded) => {
                                    if (compressedTotal > 0) {
                                        setDbProgress('Downloading & decompressing...');
                                        setDownloadProgress({ loaded, total: null, compressedTotal });
                                    } else {
                                        setDbProgress(`Decompressing... ${(loaded/1048576).toFixed(0)} MB`);
                                    }
                                });
                                setDownloadProgress(null);
                                setDbProgress('Caching for next visit...');
                                try {
                                    await idbPut('db', buf.buffer);
                                    await idbDel('db-compressed');
                                    await idbPut('db-filename', dbFile);
                                    if (serverMtime) await idbPut('db-mtime', serverMtime);
                                } catch (e) { console.warn('IndexedDB cache write failed:', e); }
                            }
                        }

                        setDbProgress('Opening database...');
                        _SQL = SQL;
                        _db = new SQL.Database(buf);
                        _hasCoreTable = cachedExec(`SELECT 1 FROM sqlite_master WHERE type='table' AND name='core_synsets'`).length > 0;
                        buildLangNames();
                        setAllLanguages(getAllLanguages());
                        setAllResources(queryResources());
                        setDbStats(queryStats());
                        setDbReady(true);

                    } catch (e) {
                        console.error('DB init error:', e);
                        setDbError(e.message);
                    }
                })();
            }, []);

            const getLangName = (langCode) => langCode ? (_langNames[langCode] || langCode.toUpperCase()) : '';
            const getLangFullName = getLangName;

            const getPosName = (posCode, capitalize = false) => {
                const names = {
                    'NOUN': 'noun', 'VERB': 'verb', 'ADJ': 'adjective', 'ADV': 'adverb',
                    'CONJ': 'conjunction', 'ADP': 'adposition', 'NREF': 'non-referential', 'UNK': 'unknown'
                };
                const name = names[posCode] || posCode?.toLowerCase() || '';
                return capitalize ? name.charAt(0).toUpperCase() + name.slice(1) : name;
            };

            const toggleSection = (key) => {
                setCollapsedSections(prev => ({ ...prev, [key]: !prev[key] }));
            };

            const toggleSynonyms = (senseId) => {
                setSynonymsCollapsed(prev => {
                    const sense = loadedSenses[senseId];
                    const autoExpand = sense?.matched_rank > 0;
                    const cur = prev[senseId];

                    return { ...prev, [senseId]: isCurrentlyExpanded ? true : false };
                });
            };

            const loadConcept = useCallback((conceptId) => {
                const cid = conceptId.toString();
                if (loadedConcepts[cid]) return loadedConcepts[cid];
                const data = queryConcept(parseInt(cid));

                    setLoadedConcepts(prev => ({ ...prev, [cid]: data }));
                }

            }, [loadedConcepts]);

            const getConceptData = (conceptId) => {
                const cid = conceptId?.toString();
                if (!cid) return null;
                return loadedConcepts[cid] || null;
            };

            // Returns [text, actualLang] for a concept's definitions, falling back
            // through English then the first available language.
            const selectDef = (defs, lang, fallback = '') => {
                if (!defs) return [fallback, null];
                if (defs[lang]) return [defs[lang], lang];
                if (defs.en) return [defs.en, 'en'];
                const first = Object.entries(defs)[0];
                return first ? [first[1], first[0]] : [fallback, null];
            };

            // Renders a language-code badge when the displayed language differs
            // from the preferred one, e.g. [fr].  Pass ml='ml-1' or 'ml-0.5'.
            const LangBadge = ({ lang, currentLang, ml = 'ml-1' }) =>
                lang && lang !== currentLang
                    ? <span className={`text-xs text-gray-400 ${ml}`}>[{lang}]</span>
                    : null;

            // Renders a comma-separated list of clickable wordforms.

            ));

            // Returns { ids, isIndirect } for the best available ARASAAC pictogram(s).
            // Priority: direct image > hypernym > eq_synonym > similar.
            const getArasaacFallback = (concept) => {
                const directIds = concept?.ara;
                let fallbackIds = null;
                if (!directIds && concept?.cr) {
                    for (const types of [['hyp', 'ihyp'], ['eqs'], ['sim']]) {
                        for (const rel of concept.cr) {
                            if (types.includes(rel.t)) {
                                const related = getConceptData(rel.to.toString()) || loadConcept(rel.to.toString());
                                if (related?.ara) { fallbackIds = related.ara; break; }
                            }
                        }
                        if (fallbackIds) break;
                    }
                }
                return { ids: directIds || fallbackIds, isIndirect: !directIds && !!fallbackIds };
            };

            const loadSenseData = useCallback((senseId) => {

            const loadConceptRelations = useCallback((conceptId) => {
                const concept = loadedConcepts[conceptId] || loadConcept(conceptId);
                if (!concept) return {};
                const relations = {};
                if (concept.cr) {
                    for (const rel of concept.cr) {
                        if (!relations[rel.t]) relations[rel.t] = [];
                        relations[rel.t].push(rel.to.toString());

                        loadConcept(rel.to.toString());

                return relations;
            }, [loadedConcepts, loadConcept]);

            const categorizeRelations = useCallback((relations) => {
                const categories = {
                    hypernyms: [], hyponyms: [], meronyms: [], holonyms: [],
                    roles: [], inferences: [], opposites: [], other: []
                };
                for (const relType in relations) {
                    const targets = relations[relType];
                    const isInverse = relType.startsWith('-');
                    const baseType = isInverse ? relType.substring(1) : relType;

                    if (baseType === 'hyp' || baseType === 'ihyp') {
                        if (isInverse) categories.hyponyms.push(...targets.map(t => ({ type: relType, target: t })));
                        else categories.hypernyms.push(...targets.map(t => ({ type: relType, target: t })));
                    } else if (baseType === 'mmer' || baseType === 'pmer' || baseType === 'smer') {
                        if (isInverse) categories.holonyms.push(...targets.map(t => ({ type: relType, target: t })));
                        else categories.meronyms.push(...targets.map(t => ({ type: relType, target: t })));
                    } else if (['aga','paa','rea','iag','iac','rag','pag','ipa','ire','pre'].includes(baseType)) {
                        categories.roles.push(...targets.map(t => ({ type: relType, target: t })));
                    } else if (baseType === 'cau' || baseType === 'ent') {
                        categories.inferences.push(...targets.map(t => ({ type: relType, target: t })));
                    } else if (baseType === 'opp') {
                        categories.opposites.push(...targets.map(t => ({ type: relType, target: t })));

            const loadConceptWithRelations = useCallback((conceptId) => {

            useEffect(() => {

            const loadProvenanceDb = useCallback(async () => {
                if (_provDb || provLoading) return;

                    await _configPromise;
                    const provFile = _siteConfig.databases?.provenance?.filename;
                    if (!provFile) { setProvLoading(false); return; }
                    let buf;
                    try {
                        const cached = await idbGet('provdb');
                        if (cached) {

                            if (!cachedFilename || cachedFilename !== provFile) {
                                await Promise.all([idbDel('provdb'), idbDel('provdb-filename')]);
                            } else {
                                buf = new Uint8Array(cached);

                    } catch (e) {
                        console.warn('IndexedDB provenance cache read failed:', e);
                    }

                    if (!buf) {
                        const response = await fetch(DB_BASE + provFile, { cache: 'reload' });
                        if (!response.ok) throw new Error(`Failed to fetch: ${response.status}`);
                        const ds = new DecompressionStream('gzip');
                        const reader = response.body.pipeThrough(ds).getReader();
                        const chunks = [];
                        let loaded = 0;
                        while (true) {
                            const { done, value } = await reader.read();
                            if (done) break;
                            chunks.push(value);
                            loaded += value.length;
                        }
                        buf = new Uint8Array(loaded);
                        let offset = 0;
                        for (const chunk of chunks) { buf.set(chunk, offset); offset += chunk.length; }
                        try {
                            await idbPut('provdb', buf.buffer);
                            await idbPut('provdb-filename', provFile);
                        } catch (e) {
                            console.warn('IndexedDB provenance cache write failed:', e);
                        }
                    }

                    _provDb = new _SQL.Database(buf);
