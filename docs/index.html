                    newUrl = `#/wordnet/${selectedWordnet}`;
                } else if (activeTab !== 'browser') {
                    newUrl = `#/${activeTab}`;
                } else if (view === 'search') {
                    const params = new URLSearchParams();
                    if (currentSearch) params.set('q', currentSearch);
                    if (languageFilter.size > 0) params.set('search_lang', Array.from(languageFilter).join(','));
                    if (posFilter.size > 0) params.set('pos', Array.from(posFilter).join(','));
                    if (definitionLanguage !== 'en') params.set('display_lang', definitionLanguage);
                    if (senseFilter) params.set('s', senseFilter);
                    const qs = params.toString();
                    newUrl = qs ? '#/search?' + qs : '#/search';
                } else if (view === 'concept' && selectedConcept) {
                    newUrl = '#/search?concept=' + selectedConcept;
                } else if (view === 'sense' && selectedSense) {
                    newUrl = '#/search?sense=' + selectedSense;
                }
                if (newUrl && newUrl !== window.location.hash) {
                    window.history.pushState({}, '', newUrl);
                }
            }, [view, currentSearch, languageFilter, posFilter, senseFilter, selectedConcept, selectedSense, dbReady, activeTab, definitionLanguage, selectedWordnet]);

            // Handle popstate
            useEffect(() => {
                const handlePopState = () => {
                    isPopStateRef.current = true;
                    const hash = window.location.hash.slice(1);
                    const [path, queryString] = hash.split('?');

                    const tabPath = path?.replace('/', '');
                    if (['about', 'publications', 'wordnets'].includes(tabPath)) {
                        setActiveTab(tabPath);
                        setSelectedWordnet(null);
                    } else if (tabPath?.startsWith('wordnet/')) {
                        setActiveTab('wordnets');
                        setSelectedWordnet(tabPath.slice('wordnet/'.length));
                    } else {
                        setActiveTab('browser');
                        const params = new URLSearchParams(queryString || '');
                        const urlSearch = params.get('q');
                        const rawSearchLang = params.get('search_lang');
                        const urlSearchLang = rawSearchLang ? new Set(rawSearchLang.split(',')) : null;
                        const urlDisplayLang = params.get('display_lang');
                        const urlPos = params.get('pos') ? new Set(params.get('pos').split(',')) : new Set();
                        const urlSense = params.get('sense');
                        const urlSenseFilter = params.get('s');
                        const urlConcept = params.get('concept');

                        if (urlSearchLang !== null) setLanguageFilter(urlSearchLang);
                        if (urlDisplayLang) setDefinitionLanguage(urlDisplayLang);
                        setPosFilter(urlPos);
                        setSenseFilter(urlSenseFilter);
                        setSynonymsCollapsed({});

                        if (urlConcept) {
                            setSelectedConcept(urlConcept);
                            setSelectedSense(null);
                            setView('concept');
                            loadConceptWithRelations(urlConcept);
                        } else if (urlSense) {
                            setSelectedSense(urlSense);
                            setSelectedConcept(null);
                            setView('sense');
                            loadSenseData(urlSense);
                        } else {
                            setView('search');
                            setSelectedConcept(null);
                            setSelectedSense(null);
                            if (urlSearch) {
                                setSearchTerm(urlSearch);
                                setCurrentSearch(urlSearch);
                                // Use URL param if provided; otherwise fall back to
                                // the local.json searchLanguage default (read directly
                                // from _siteConfig to avoid stale closure over state).
                                const def = _siteConfig.searchLanguage;
                                const searchLang = urlSearchLang ?? (def
                                    ? new Set(Array.isArray(def) ? def : [def])
                                    : new Set());
                                performSearch(urlSearch, searchLang, urlPos, urlSenseFilter);
                            }
                        }
                    }
                };

                // Handle initial URL (only once, even if effect re-runs due to dep changes)
                if (dbReady && !initialUrlHandledRef.current) {
                    initialUrlHandledRef.current = true;
                    const hash = window.location.hash;
                    if (hash && hash !== '#/search') handlePopState();
                }

                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, [dbReady, loadConceptWithRelations, loadSenseData]);

            // Search
            const performSearch = useCallback((term, lang, pos, sense) => {
                if (!term?.trim() || !dbReady) return;
                setLoadingResults(true);

                // Defer query so the spinner renders before the (potentially slow) SQL runs
                setTimeout(() => {
                const t = term.trim();
                const mode = detectSearchMode(t);
                const results = mode === 'ili'        ? searchByIli(t)
                              : mode === 'definition' ? searchDefinition(t.slice(4).trim(), lang)
                              : mode === 'glob'       ? searchGlob(t)
                              : searchWordform(t);
                const senseMap = {};

                results.forEach(r => {
                    if (lang && lang.size > 0 && !lang.has(r.lg)) return;
                    if (pos && pos.size > 0 && !pos.has(r.pos)) return;
                    const sid = r.sense_id.toString();
                    if (sense && sid !== sense) return;

                    const prev = senseMap[sid];
                    senseMap[sid] = {
                        id: sid,
                        l: r.lemma,
                        lg: r.lg,
                        c: r.synset_id,
                        ind: r.ind,
                        ontological_category: r.pos,
                        matched_rank: prev ? Math.max(prev.matched_rank, r.matched_rank) : r.matched_rank,
                    };
                });

                setLoadedSenses(prev => ({ ...prev, ...senseMap }));
                setCurrentSearchSenseIds(new Set(Object.keys(senseMap)));

                setLoadingResults(false);

                if (sense) {
                    setSynonymsCollapsed(prev => ({ ...prev, [sense]: false }));
                }

                // Load full sense data in background (batched)
                const senseIds = Object.keys(senseMap);
                const BATCH_SIZE = 50;
                let i = 0;
                const loadBatch = () => {
                    if (i >= senseIds.length) return;
                    const batch = senseIds.slice(i, i + BATCH_SIZE);
                    setLoadedSenses(prev => {
                        const updates = {};
                        batch.forEach(sid => {
                            const full = querySense(parseInt(sid));
                            if (full) updates[sid] = { ...full, matched_rank: prev[sid]?.matched_rank };
                        });
                        return { ...prev, ...updates };
                    });
                    i += BATCH_SIZE;
                    if (i < senseIds.length) setTimeout(loadBatch, 0);
                };
                setTimeout(loadBatch, 0);
                }, 0); // end deferred search
            }, [dbReady]);

            const handleSearch = () => {
                if (!searchTerm.trim()) return;
                const term = searchTerm.trim();
                setCurrentSearch(term);
                setSenseFilter(null);
                setSynonymsCollapsed({});
                setActiveTab('browser');
                setView('search');
                performSearch(term, languageFilter, posFilter, null);
            };

            const handleKeyPress = (e) => { if (e.key === 'Enter') handleSearch(); };

            // Initial search on DB ready
            useEffect(() => {
                if (dbReady && currentSearch && view === 'search') {
                    performSearch(currentSearch, languageFilter, posFilter, senseFilter);
                }
            }, [dbReady]);

            const getFilteredWordforms = () => {
                if (!currentSearch) return [];
                const results = [];
                const ids = senseFilter ? [senseFilter] : [...currentSearchSenseIds];
                for (const senseId of ids) {
                    const sense = loadedSenses[senseId];
                    if (!sense) continue;
                    const lang = sense.lg;
                    if (languageFilter.size > 0 && !languageFilter.has(lang)) continue;
                    const pos = sense.ontological_category || getConceptData(sense.c?.toString())?.oc || 'UNK';
                    if (posFilter.size > 0 && !posFilter.has(pos)) continue;
                    results.push({ ...sense, id: senseId, ontological_category: pos });
                }
                return results;
            };

            // Navigation handlers
            const conceptHref = (id) => `#/search?concept=${id}`;
            const senseHref = (id) => `#/search?sense=${id}`;
            const onConceptLinkClick = (e, id) => {
                if (e.ctrlKey || e.metaKey || e.shiftKey || e.button !== 0) return;
                e.preventDefault();
                handleConceptClick(id);
            };
            const onSenseLinkClick = (e, id) => {
                if (e.ctrlKey || e.metaKey || e.shiftKey || e.button !== 0) return;
                e.preventDefault();
                handleSenseClick(id);
            };

            const showTooltip = (id, e) => {
                if (tooltipTimerRef.current) clearTimeout(tooltipTimerRef.current);
                const x = e.clientX, y = e.clientY;
                tooltipTimerRef.current = setTimeout(() => {
                    if (!loadedConcepts[id.toString()]) loadConcept(id.toString());
                    setConceptTooltip({ id: parseInt(id), x, y });
                }, 300);
            };
            const hideTooltip = () => {
                if (tooltipTimerRef.current) { clearTimeout(tooltipTimerRef.current); tooltipTimerRef.current = null; }
                setConceptTooltip(null);
            };

            const handleConceptClick = (conceptId) => {
                nodeSizeCache.current.clear();
                hideTooltip();
                setSelectedConcept(conceptId.toString());
                setSelectedSense(null);
                setView('concept');
                setSynonymsCollapsed({});
                setPathResult(null);
                setPathNotFound(false);
                setPathTargetIli('');
                setPathTargetRowid(null);
                setExpandedRelGroups(new Set());
                loadConceptWithRelations(conceptId.toString());
            };

            const handleSenseClick = (senseId) => {
                hideTooltip();
                setSelectedSense(senseId.toString());
                setSelectedConcept(null);
                setView('sense');
                setSynonymsCollapsed({});
                loadSenseData(senseId.toString());
            };

            const handleWordformClick = (form) => {
                setSearchTerm(form);
                setCurrentSearch(form);
                setView('search');
                setSenseFilter(null);
                setSynonymsCollapsed({});
                performSearch(form, languageFilter, posFilter, null);
            };

            const handleWordformClickWithSense = (form, senseId) => {
                setSearchTerm(form);
                setCurrentSearch(form);
                setView('search');
                setSenseFilter(senseId?.toString());
                setSynonymsCollapsed({});
                setLanguageFilter(new Set());
                setPosFilter(new Set());
                performSearch(form, new Set(), new Set(), senseId?.toString());
            };

            const handleBackToSearch = () => {
                setView('search');
                setSelectedConcept(null);
                setSelectedSense(null);
                setSynonymsCollapsed({});
            };

            const handleLogoClick = () => {
                setSearchTerm(''); setCurrentSearch(''); setView('search');
                setSelectedConcept(null); setSelectedSense(null);
                setLanguageFilter(new Set()); setPosFilter(new Set());
                setSenseFilter(null); setCurrentSearchSenseIds(new Set()); setLoadedSenses({}); setLoadedConcepts({});
                setSynonymsCollapsed({}); setActiveTab('browser');
            };

            const renderExample = (exampleHtml) => {
                const div = document.createElement('div');
                div.innerHTML = exampleHtml;
                const parts = [];
                div.childNodes.forEach((node, idx) => {
                    if (node.nodeType === Node.TEXT_NODE) {
                        if (node.textContent) parts.push(<span key={idx}>{node.textContent}</span>);
                    } else if (node.nodeName === 'B') {
                        parts.push(<strong key={idx}>{node.textContent}</strong>);
                    }
                });
                return parts;
            };

            const renderDefinitionWithLinks = (definitionText, annotations) => {
                if (!annotations || annotations.length === 0) return definitionText;
                annotations.forEach(ann => {
                    const sid = ann.s.toString();
                    if (!loadedSenses[sid]) loadSenseData(sid);
                });
                const parts = [];
                let lastIndex = 0;
                const sorted = [...annotations].sort((a, b) => a.so - b.so);
                sorted.forEach((ann, idx) => {
                    if (ann.so > lastIndex) {
                        parts.push(<span key={`text-${idx}`}>{definitionText.substring(lastIndex, ann.so)}</span>);
                    }
                    const text = definitionText.substring(ann.so, ann.eo);
                    const linkedSense = loadedSenses[ann.s.toString()];
                    if (linkedSense?.l) {
                        parts.push(
                            <button key={`link-${idx}`}
                                onClick={(e) => { e.stopPropagation(); handleWordformClickWithSense(linkedSense.l, ann.s.toString()); }}
                                className="text-blue-600 hover:underline cursor-pointer"
                            >{text}</button>
                        );
                    } else {
                        parts.push(<span key={`link-${idx}`} className="text-blue-600">{text}</span>);
                    }
                    lastIndex = ann.eo;
                });
                if (lastIndex < definitionText.length) {
                    parts.push(<span key="text-end">{definitionText.substring(lastIndex)}</span>);
                }
                return parts;
            };

            const renderProvenance = (tableName, itemRowid) => {
                if (!showProvenance || !provenanceReady) return null;
                const rows = queryProvenance(tableName, itemRowid);
                if (rows.length === 0) return null;
                return (
                    <span className="text-xs text-gray-400 ml-1">
                        ({rows.map((s, i) => (
                            <span key={s.code + (s.version || '')}>
                                {i > 0 && ', '}
                                <button
                                    onClick={() => { setSelectedWordnet(s.code); setActiveTab('wordnets'); }}
                                    className="hover:text-blue-500 hover:underline"
                                >{s.code}{s.version ? `:${s.version}` : ''}</button>
                            </span>
                        ))})
                    </span>
                );
            };

            const renderCompactProvenance = (tableName, rowid) => {
                if (!showProvenance || !provenanceReady || !rowid) return null;
                const rows = queryProvenance(tableName, rowid);
                if (rows.length === 0) return null;
                const first = rows[0];
                const rest = rows.slice(1);
                return (
                    <span className="relative inline-block group text-xs text-gray-400 ml-1 cursor-default">
                        (<button onClick={() => { setSelectedWordnet(first.code); setActiveTab('wordnets'); }}
                            className="hover:text-blue-500 hover:underline">
                            {first.code}{first.version ? `:${first.version}` : ''}
                        </button>{rest.length > 0 && <span> +{rest.length}</span>})
                        {rest.length > 0 && (
                            <span className="absolute bottom-full left-0 hidden group-hover:flex flex-col bg-white border border-gray-200 rounded shadow-lg text-xs p-1.5 z-10 whitespace-nowrap gap-0.5">
                                {rows.map((s, i) => (
                                    <button key={i} onClick={() => { setSelectedWordnet(s.code); setActiveTab('wordnets'); }}
                                        className="text-left hover:text-blue-500 hover:underline">
                                        {s.code}{s.version ? `:${s.version}` : ''}
                                    </button>
                                ))}
                            </span>
                        )}
                    </span>
                );
            };

            const renderPronunciations = (prons) => {
                if (!showPronunciation || !prons || prons.length === 0) return null;
                return (
                    <div className="text-xs text-gray-500 font-normal mt-0.5">
                        {prons.map((p, i) => (
                            <span key={i} className="mr-3">
                                {p.pronunciation && <span title={p.variety || undefined}>/{p.pronunciation}/</span>}
                                {p.audio && <button onClick={() => new Audio(p.audio).play()} title={p.variety || 'Play audio'} className="ml-1 hover:text-blue-500">🔊</button>}
                            </span>
                        ))}
                    </div>
                );
            };

            const hasActiveSettings = definitionLanguage !== 'en' || !showPronunciation || showProvenance || languageFilter.size > 0 || posFilter.size > 0;

            // Concept graph
            const relationsMap = relatedConcepts[selectedConcept];
            let hasRelationsToDisplay = false;
            if (relationsMap) {
                for (const key in relationsMap) {
                    if (Array.isArray(relationsMap[key]) && relationsMap[key].length > 0) {
                        hasRelationsToDisplay = true;
                        break;
                    }
                }
            }

            const getAvailableCategories = (conceptId) => {
                const relations = relatedConcepts[conceptId];
                if (!relations) return [];
                const categories = categorizeRelations(relations);
                const available = [];
                if (categories.hypernyms.length > 0) available.push('hypernyms');
                if (categories.hyponyms.length > 0) available.push('hyponyms');
                if (categories.meronyms.length > 0) available.push('meronyms');
                if (categories.holonyms.length > 0) available.push('holonyms');
                if (categories.roles.length > 0) available.push('roles');
                if (categories.inferences.length > 0) available.push('inferences');
                if (categories.opposites.length > 0) available.push('opposites');
                if (categories.other.length > 0) available.push('other');
                return available;
            };

            const handleCategorySelect = (conceptId, category) => {
                const relations = relatedConcepts[conceptId];
                if (!relations || isLoadingRelationsRef.current) return;

                const newSelectedCategories = {...selectedCategories};
                if (!newSelectedCategories[conceptId]) newSelectedCategories[conceptId] = new Set();
                else newSelectedCategories[conceptId] = new Set(newSelectedCategories[conceptId]);

                if (newSelectedCategories[conceptId].has(category)) {
                    newSelectedCategories[conceptId].delete(category);
                    if (newSelectedCategories[conceptId].size === 0) delete newSelectedCategories[conceptId];
                } else {
                    newSelectedCategories[conceptId].add(category);
                }

                const newVisibleNodes = new Set([selectedConcept]);
                const queue = [selectedConcept];
                const processed = new Set();
                while (queue.length > 0) {
                    const currentId = queue.shift();
                    if (processed.has(currentId)) continue;
                    processed.add(currentId);
                    const catsForNode = newSelectedCategories[currentId];
                    if (!catsForNode || catsForNode.size === 0) continue;
                    const relationsForNode = relatedConcepts[currentId];
                    if (!relationsForNode) continue;
                    const categorizedRels = categorizeRelations(relationsForNode);
                    catsForNode.forEach(cat => {
                        if (categorizedRels[cat]) {
                            categorizedRels[cat].forEach(rel => {
                                if (!newVisibleNodes.has(rel.target)) {
                                    newVisibleNodes.add(rel.target);
                                    queue.push(rel.target);
                                }
                            });
                        }
                    });
                }

                setSelectedCategories(newSelectedCategories);
                setVisibleNodes(newVisibleNodes);

                if (simulationRef.current) simulationRef.current.stop();

                // Load missing nodes
                const nodesToLoad = Array.from(newVisibleNodes).filter(nid => !relatedConcepts[nid]);
                if (nodesToLoad.length > 0) {
                    isLoadingRelationsRef.current = true;
                    const updates = {};
                    nodesToLoad.forEach(nid => {
                        loadConcept(nid);
                        updates[nid] = loadConceptRelations(nid);
                    });
                    setRelatedConcepts(prev => ({...prev, ...updates}));
                    isLoadingRelationsRef.current = false;
                    if (simulationRef.current) simulationRef.current.alpha(0.2).restart();
                }
            };

            // D3 concept graph effect
            useEffect(() => {
                if (view !== 'concept' || !selectedConcept || !relatedConcepts[selectedConcept] || relationsView !== 'graph') return;

                const container = document.getElementById('concept-graph');
                if (!container) return;

                let rafId, timeoutId;
                timeoutId = setTimeout(() => {
                    const width = container.clientWidth;
                    const height = 500;

                    const isNewConcept = lastConceptRef.current !== selectedConcept;
                    lastConceptRef.current = selectedConcept;

                    // Build nodes and links
                    const nodesMap = new Map();
                    const linksArray = [];

                    const addNode = (id) => {
                        if (nodesMap.has(id)) return;
                        const concept = loadedConcepts[id] || loadConcept(id);
                        const pos = getPosName(concept?.oc || '');
                        const lblInfo = getConceptLabel(parseInt(id), definitionLanguage);
                        const labelBase = lblInfo?.form || concept?.d?.[definitionLanguage] || concept?.d?.en || '';
                        const labelActualLang = lblInfo?.lang;
                        const label = (labelActualLang && labelActualLang !== definitionLanguage)
                            ? `${labelBase} [${labelActualLang}]` : labelBase;
                        nodesMap.set(id, {
                            id, label, pos,
                            isCenter: id === selectedConcept
                        });
                    };

                    addNode(selectedConcept);
                    visibleNodes.forEach(nid => {
                        if (!nodesMap.has(nid)) addNode(nid);
                    });

                    // Build links from relations
                    visibleNodes.forEach(sourceId => {
                        const rels = relatedConcepts[sourceId];
                        if (!rels) return;
                        for (const relType in rels) {
                            rels[relType].forEach(targetId => {
                                if (visibleNodes.has(targetId)) {
                                    const shortCode = relType.startsWith('-') ? relType.substring(1) : relType;
                                    linksArray.push({
                                        source: sourceId, target: targetId,
                                        type: relType,
                                        color: _relColors[shortCode] || '#999'
                                    });
                                }
                            });
                        }
                    });

                    const nodesArray = Array.from(nodesMap.values());

                    // Reuse or create SVG
                    let svg = d3.select(container).select('svg');
                    if (svg.empty() || isNewConcept) {
                        d3.select(container).selectAll('*').remove();
                        svg = d3.select(container).append('svg')
                            .attr('width', width).attr('height', height)
                            .style('border', '1px solid #e5e7eb')
                            .style('border-radius', '0.5rem');
                        svgRef.current = svg;

                        const g = svg.append('g');
                        gRef.current = g;

                        const zoom = d3.zoom().scaleExtent([0.1, 4])
                            .on('zoom', (event) => g.attr('transform', event.transform));
                        svg.call(zoom);
                        svg.call(zoom.transform, d3.zoomIdentity.translate(width/2, height/2).scale(0.8));

                        g.append('g').attr('class', 'links');
                        g.append('g').attr('class', 'nodes');
                    }

                    const g = gRef.current;

                    // Force simulation
                    const edgeLengthForce = (alpha) => {
                        linksArray.forEach(link => {
                            const source = typeof link.source === 'object' ? link.source : nodesMap.get(link.source);
                            const target = typeof link.target === 'object' ? link.target : nodesMap.get(link.target);
                            if (!source || !target) return;
                            const dx = target.x - source.x;
                            const dy = target.y - source.y;
                            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                            const desired = 200;
                            const strength = 0.1 * alpha;
                            const diff = (dist - desired) / dist * strength;
                            const mx = dx * diff * 0.5;
                            const my = dy * diff * 0.5;
                            source.x += mx; source.y += my;
                            target.x -= mx; target.y -= my;
                        });
                    };
                    edgeLengthForce.initialize = () => {};

                    let simulation = simulationRef.current;
                    if (!simulation || isNewConcept) {
                        if (simulation) simulation.stop();
                        simulation = d3.forceSimulation(nodesArray)
                            .force('charge', d3.forceManyBody().strength(-300))
                            .force('center', d3.forceCenter(0, 0).strength(0.05))
                            .force('collision', d3.forceCollide().radius(80))
                            .force('link', d3.forceLink(linksArray).id(d => d.id).distance(200).strength(0.3))
                            .force('edgeLength', edgeLengthForce);
                        simulationRef.current = simulation;
                    } else {
                        simulation.nodes(nodesArray);
                        simulation.force('link').links(linksArray);
                    }

                    simulation.on('tick', () => {
                        rafId = requestAnimationFrame(() => {
                            // Update links
                            const link = g.select('.links')
                                .selectAll('line').data(linksArray, d => `${d.source.id || d.source}-${d.target.id || d.target}`);
                            link.enter().append('line')
                                .attr('stroke-width', 1.5).attr('stroke-opacity', 0.6)
                                .merge(link)
                                .attr('stroke', d => d.color)
                                .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                                .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
                            link.exit().remove();

                            // Update nodes
                            const node = g.select('.nodes')
                                .selectAll('g.node').data(nodesArray, d => d.id);

                            const nodeEnter = node.enter().append('g').attr('class', 'node')
                                .style('cursor', 'pointer')
                                .call(d3.drag()
                                    .on('start', (event, d) => {
                                        if (!event.active) simulation.alphaTarget(0.1).restart();
                                        d.fx = d.x; d.fy = d.y;
                                    })
                                    .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
                                    .on('end', (event, d) => {
                                        if (!event.active) simulation.alphaTarget(0);
                                        d.fx = null; d.fy = null;
                                    })
                                )
                                .on('click', (event, d) => { if (!d.isCenter) handleConceptClick(d.id); })
                                .on('mouseenter', (event, d) => {
                                    if (hoverTimeoutRef.current) {
                                        clearTimeout(hoverTimeoutRef.current);
                                        hoverTimeoutRef.current = null;
                                    }
                                    setHoveredNode(d.id);
                                    const graphRect = container.getBoundingClientRect();
                                    const svgPoint = svg.node().createSVGPoint();
                                    const ctm = g.node().getCTM();
                                    svgPoint.x = d.x + (d.width || 100);
                                    svgPoint.y = d.y;
                                    const screenPoint = svgPoint.matrixTransform(ctm);
                                    setHoverMenuPositionRef.current({
                                        x: Math.min(screenPoint.x, width - 180),
                                        y: Math.max(0, Math.min(screenPoint.y, height - 200))
                                    });
                                })
                                .on('mouseleave', () => {
                                    hoverTimeoutRef.current = setTimeout(() => {
                                        if (!menuInteractionRef.current) {
                                            setHoveredNode(null);
                                            setHoverMenuPositionRef.current(null);
                                        }
                                    }, 200);
                                })
                                .each(function(d) {
                                    const nodeGroup = d3.select(this);
                                    const maxWidth = d.isCenter ? 250 : 200;
                                    const avgCharWidth = 7;
                                    const maxCharsPerLine = Math.floor(maxWidth / avgCharWidth);
                                    const labelWords = d.label.split(' ');
                                    const lines = [];
                                    let currentLine = '';
                                    labelWords.forEach(word => {
                                        if (currentLine.length + word.length + 1 <= maxCharsPerLine) {
                                            currentLine += (currentLine ? ' ' : '') + word;
                                        } else {
                                            if (currentLine) lines.push(currentLine);
                                            currentLine = word;
                                        }
                                    });
                                    if (currentLine) lines.push(currentLine);
                                    if (lines.length === 0) lines.push('');

                                    const padding = 12;
                                    const lineHeight = d.isCenter ? 18 : 17;
                                    const posWidth = d.pos.length * avgCharWidth;
                                    const posGap = 12;

                                    const line0LabelWidth = lines[0].length * avgCharWidth;
                                    let actualMaxWidth = line0LabelWidth + posGap + posWidth;
                                    for (let i = 1; i < lines.length; i++) {
                                        actualMaxWidth = Math.max(actualMaxWidth, lines[i].length * avgCharWidth);
                                    }

                                    const boxWidth = Math.min(actualMaxWidth + padding * 2, maxWidth + padding * 2);
                                    const boxHeight = lines.length * lineHeight + padding * 2;

                                    nodeGroup.append('rect')
                                        .attr('width', boxWidth).attr('height', boxHeight)
                                        .attr('x', 0).attr('y', 0)
                                        .attr('fill', '#ffffff').attr('rx', 3);

                                    const textGroup = nodeGroup.append('g').attr('transform', 'translate(12, 12)');
                                    const firstLineY = lineHeight * 0.75;
                                    textGroup.append('text')
                                        .attr('x', 0).attr('y', firstLineY)
                                        .attr('font-size', d.isCenter ? 15 : 14)
                                        .text(lines[0]);
                                    textGroup.append('text')
                                        .attr('x', line0LabelWidth + posGap).attr('y', firstLineY)
                                        .attr('font-size', d.isCenter ? 15 : 14)
                                        .attr('font-style', 'italic')
                                        .text(d.pos);
                                    for (let i = 1; i < lines.length; i++) {
                                        textGroup.append('text')
                                            .attr('x', 0).attr('y', firstLineY + i * lineHeight)
                                            .attr('font-size', d.isCenter ? 15 : 14)
                                            .text(lines[i]);
                                    }

                                    d.width = boxWidth;
                                    d.height = boxHeight;
                                });

                            nodeEnter.merge(node)
                                .attr('transform', d => `translate(${d.x - (d.width || 0)/2}, ${d.y - (d.height || 0)/2})`);
                            node.select('rect')
                                .attr('stroke', d => d.isCenter ? '#000000' : '#d1d5db')
                                .attr('stroke-width', d => d.isCenter ? 2 : 1);
                            node.exit().remove();

                            simulation.nodes(nodesArray);
                            simulation.force('link').links(linksArray);
                        });
                    });

                    simulation.alpha(isNewConcept ? 0.3 : 0.1).restart();
                }, 50);

                    if (timeoutId) clearTimeout(timeoutId);
                };

                                                                        {' → '}
                                                                        <a href={senseHref(row.ex_tgt_rowid)} onClick={e => { onSenseLinkClick(e, row.ex_tgt_rowid); setActiveTab('browser'); }} className="text-blue-600 hover:underline">{row.tgt_form}</a>
                                                                    </>
                                                                ) : <span className="text-gray-400">—</span>}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    )}
                                </div>
                                );
                            }

                            const sortResources = (col) => setWnSort(s => ({ col, asc: s.col === col ? !s.asc : true }));
                            const sortedResources = (() => {
                                if (!wnSort.col) return allResources;
                                const key = { Language: r => getLangFullName(r.language) || '', Name: r => r.label || r.code || '', Concepts: r => r.synset_count ?? -1, Senses: r => r.sense_count ?? -1, Version: r => r.version || '', Licence: r => shortLicence(r.licence) || '' }[wnSort.col];
                                return [...allResources].sort((a, b) => {
                                    const av = key(a), bv = key(b);
                                    const cmp = typeof av === 'number' ? av - bv : av.localeCompare(bv);
                                    return wnSort.asc ? cmp : -cmp;
                                });
                            })();
                            const sortTh = (col, right) => {
                                const active = wnSort.col === col;
                                return <th className={`px-3 py-2 border border-gray-200 cursor-pointer select-none hover:bg-gray-200${right ? ' text-right' : ''}`} onClick={() => sortResources(col)}>{col}{active ? (wnSort.asc ? ' ▲' : ' ▼') : ''}</th>;
                            };
                            return (
                            <div>
                                <h2 className="text-xl font-bold mb-4">Contributing Wordnets</h2>
                                {allResources.length === 0 ? (
                                    <p className="text-gray-600">No resource metadata available.</p>
                                ) : (
                                    <table className="w-full text-sm border-collapse">
                                        <thead>
                                            <tr className="bg-gray-100 text-left">
                                                {sortTh('Language')}
                                                {sortTh('Name')}
                                                {sortTh('Concepts', true)}
                                                {sortTh('Senses', true)}
                                                {sortTh('Version')}
                                                <th className="px-3 py-2 border border-gray-200">Citation</th>
                                                {sortTh('Licence')}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {sortedResources.map((r, i) => (
                                                <tr key={r.code + '|' + i}
                                                    className={i % 2 === 0 ? 'bg-white' : 'bg-gray-50'}>
                                                    <td className="px-3 py-2 border border-gray-200 whitespace-nowrap">
                                                        {r.language
                                                            ? <span title={r.language} className="cursor-help">{getLangFullName(r.language)}</span>
                                                            : '—'}
                                                    </td>
                                                    <td className="px-3 py-2 border border-gray-200 font-medium">
                                                        {r.url
                                                            ? <a href={r.url} target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:underline">{r.label || r.code}</a>
                                                            : (r.label || r.code)}
                                                        <span className="float-right relative group/wni">
                                                            <button onClick={() => setSelectedWordnet(r.code)}
                                                                    className="text-blue-600 hover:text-blue-800"
                                                                    title="Show wordnet summary">ⓘ</button>
                                                            <div className="absolute right-0 top-full mt-1 hidden group-hover/wni:block bg-white border border-gray-200 rounded shadow-lg p-3 text-xs text-gray-700 z-40 w-56 space-y-1">
                                                                {r.version && <div><span className="text-gray-500">Version:</span> {r.version}</div>}
                                                                {r.language && <div><span className="text-gray-500">Language:</span> {getLangFullName(r.language)}</div>}
                                                                {r.licence && <div><span className="text-gray-500">Licence:</span> {r.licence.startsWith('http') ? <a href={r.licence} target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:underline">{shortLicence(r.licence)}</a> : shortLicence(r.licence)}</div>}
                                                                {r.synset_count != null && <div><span className="text-gray-500">Concepts:</span> {r.synset_count.toLocaleString()}</div>}
                                                                {r.sense_count != null && <div><span className="text-gray-500">Senses:</span> {r.sense_count.toLocaleString()}</div>}
                                                                <div className="pt-1 border-t border-gray-100 text-gray-400 italic">Click for full summary (may be slow)</div>
                                                            </div>
                                                        </span>
                                                    </td>
                                                    <td className="px-3 py-2 border border-gray-200 text-right tabular-nums">{r.synset_count != null ? r.synset_count.toLocaleString() : '—'}</td>
                                                    <td className="px-3 py-2 border border-gray-200 text-right tabular-nums">{r.sense_count != null ? r.sense_count.toLocaleString() : '—'}</td>
                                                    <td className="px-3 py-2 border border-gray-200 whitespace-nowrap">{r.version || '—'}</td>
                                                    <td className="px-3 py-2 border border-gray-200">
                                                        {r.citation
                                                            ? <details><summary className="cursor-pointer text-blue-600 hover:underline list-none w-fit">cite</summary><p className="mt-1 text-xs text-gray-600 max-w-sm">{r.citation}</p></details>
                                                            : '—'}
                                                    </td>
                                                    <td className="px-3 py-2 border border-gray-200 whitespace-nowrap">
                                                        {r.licence
                                                            ? <a href={r.licence} target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:underline">{shortLicence(r.licence)}</a>
                                                            : '—'}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                )}
                            </div>
                            );
                        })()}
                    </main>

                    {siteConfig.footer && (
                    <footer className="mt-auto py-4">
                        <div className="max-w-4xl mx-auto px-4 border-t border-gray-200 pt-4 text-center text-sm text-gray-600">
                            {typeof siteConfig.footer === 'string'
                                ? <div dangerouslySetInnerHTML={{ __html: siteConfig.footer }} />
                                : <>
                                    {siteConfig.footer.text && <div className="mb-2">{siteConfig.footer.text}</div>}
                                    {siteConfig.footer.logos?.length > 0 && (
                                        <div className="flex items-center justify-center gap-6 flex-wrap">
                                            {siteConfig.footer.logos.map((logo, i) => (
                                                logo.url
                                                    ? <a key={i} href={logo.url} target="_blank" rel="noopener noreferrer" className="inline-block hover:opacity-80">
                                                          <img src={logo.src} alt={logo.alt || ''} style={{height: logo.height || '3.5rem'}} className="inline-block" />
                                                      </a>
                                                    : <img key={i} src={logo.src} alt={logo.alt || ''} style={{height: logo.height || '3.5rem'}} className="inline-block" />
                                            ))}
                                        </div>
                                    )}
                                  </>
                            }
                        </div>
                    </footer>
                    )}

                {conceptTooltip && (() => {
                    const ct = conceptTooltip;
                    const concept = getConceptData(ct.id.toString());
                    if (!concept) return null;
                    const [def] = selectDef(concept.d, definitionLanguage, '');
                    const li = getConceptLabel(ct.id, definitionLanguage);
                    const allSenseIds = concept.s ? Object.values(concept.s).flat().map(s => s.toString()) : [];
                    const firstEx = allSenseIds.map(sid => loadedSenses[sid]?.ex?.[0]).find(Boolean);
                    const left = Math.min(ct.x + 14, window.innerWidth - 300);
                    const top = ct.y + 16;
                    return (
                        <div style={{ position: 'fixed', left, top, zIndex: 9999, maxWidth: 280, pointerEvents: 'none' }}
                             className="bg-white border border-gray-300 rounded shadow-lg px-3 py-2 text-sm">
                            {li && <div className="font-semibold text-gray-800">{li.form}</div>}
                            <div className="text-gray-500 italic text-xs">{getPosName(concept.oc)}</div>
                            {def && <div className="text-gray-700 mt-1">{def.length > 160 ? def.slice(0, 160) + '…' : def}</div>}
                            {firstEx && <div className="text-gray-500 italic mt-0.5 text-xs">"{firstEx}"</div>}
                        </div>
                    );
                })()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DictionaryBrowser />);
    </script>
</body>
</html>
